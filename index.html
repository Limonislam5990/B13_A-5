<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
    <div class="card w-96 bg-base-100 shadow-xl border p-8 text-center">
        <img src="assets/github-logo.png" alt="Logo" class="mx-auto mb-4">
        <h2 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h2>
        <p class="text-gray-500 mb-6">Sign in to manage your issues</p>
        
        <p class="font-semibold mb-2 text-start">Username</p>
        <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full mb-4" />

        <p class="font-semibold mb-2 text-start">Password</p>
        <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full mb-4" />
        
        <button onclick="handleLogin()" class="btn btn-primary w-full text-white">Sign In</button>
        
        <div class="mt-6 text-sm text-left bg-gray-50 p-3 rounded">
            <p><strong>Demo Credential:</strong></p>
            <p>User: admin | Pass: admin123</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'admin' && pass === 'admin123') {
                window.location.href = 'home.html';
            } else {
                alert('Invalid Credentials! Try admin / admin123');
            }
        }
    </script>
</body>
</html>
